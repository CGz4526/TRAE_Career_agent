# 后端职途 —— nginx server block（子域名）
# 用法：放到 /etc/nginx/sites-enabled/career-agent.conf，然后 `sudo nginx -t && sudo nginx -s reload`
# nginx 实例常驻即可，切换项目时不用动它；没启动的那边后端会临时 502，属正常。
server {
    listen 80;
    server_name career.your.domain;   # << 改成你的域名或服务器公网 IP

    # 前端静态产物（已 vite build 的 dist/）
    root /opt/app/backend-career-agent/frontend/dist;
    index index.html;

    # SPA history 回退
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Java 业务服务
    location /api/ {
        proxy_pass http://127.0.0.1:8080/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Python AI 服务
    location /agent/ {
        proxy_pass http://127.0.0.1:8001/agent/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # 模拟面试是流式/SSE，拉长约过期
        proxy_http_version 1.1;
        proxy_read_timeout 300s;
    }
}
